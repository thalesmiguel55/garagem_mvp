<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Garagem</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container adminContainer">
    <header class="adminTop">
      <div>
        <div class="brandKicker">ADMIN</div>
        <h1 class="adminTitle">Garagem</h1>
        <p class="muted">Histórico de retiradas, devoluções, checklists e fotos.</p>
      </div>
    </header>

    <div class="card" id="loginCard">
      <label>Senha do Admin</label>
      <input id="password" type="password" placeholder="Digite a senha" />
      <button class="primary" id="btnLogin">Entrar</button>
      <p class="msg" id="loginMsg"></p>
    </div>

    <div id="adminCard" style="display:none;">
      <div class="adminToolbar">
        <div>
          <nav class="adminTabs" aria-label="Seções do admin">
            <button type="button" class="adminTab active" id="tabRecords" data-view="records">Registros</button>
            <button type="button" class="adminTab" id="tabVehicles" data-view="vehicles">Carros</button>
          </nav>
          <p class="muted" id="adminViewHint">Clique em um registro para abrir os detalhes.</p>
        </div>
        <div class="adminActions">
          <button class="secondary" id="btnReload">Atualizar</button>
          <button class="secondary secondaryQuiet" id="btnLogout">Sair</button>
        </div>
      </div>

      <section id="recordsView">
        <div id="summary" class="adminSummary"></div>

        <section class="adminGrid">
          <div class="adminPanel">
            <div id="list"></div>
          </div>

          <aside class="adminPanel detailPanel">
            <div class="panelHeader">
              <h3>Detalhes</h3>
            </div>
            <div id="details"></div>

            <div class="panelHeader photosHeader">
              <h3>Fotos</h3>
            </div>
            <div id="photos" class="adminPhotos"></div>
          </aside>
        </section>
      </section>

      <section id="vehiclesView" style="display:none;">
        <div class="adminGrid vehiclesGrid">
          <div class="adminPanel detailPanel">
            <div class="panelHeader">
              <h3 id="vehicleFormTitle">Cadastrar carro</h3>
            </div>
            <form id="vehicleForm" class="vehicleForm">
              <input type="hidden" id="vehicleId" value="" />

              <label for="vehiclePlate">Placa</label>
              <input id="vehiclePlate" name="plate" placeholder="Ex.: ABC1D23" required />

              <label for="vehicleDescription">Descrição / local (opcional)</label>
              <input id="vehicleDescription" name="description" placeholder="Ex.: PORTARIA" />

              <label for="vehicleBox">Caixa de liberação (opcional)</label>
              <input id="vehicleBox" name="caixa" type="number" min="1" placeholder="Ex.: 1" />

              <div class="vehicleFormActions">
                <button type="submit" class="primary" id="btnSaveVehicle">Cadastrar carro</button>
                <button type="button" class="secondary secondaryQuiet" id="btnCancelVehicle" style="display:none;">Cancelar edição</button>
              </div>
            </form>
          </div>

          <div class="adminPanel">
            <div class="panelHeader vehiclesPanelHeader">
              <h3>Carros cadastrados</h3>
            </div>
            <div id="vehiclesList"></div>
          </div>
        </div>
      </section>

      <p class="msg" id="adminMsg"></p>
    </div>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
